before_script:
  - nix-env -iA nixpkgs.openssh nixpkgs.gnupg nixpkgs.curl nixpkgs.git nixpkgs.pass || true
  # prepare github deployment for NUR
  - mkdir -p ~/.ssh
  - echo "$github_deploy_privkey" > ~/.ssh/github_deploy.key
  - chmod 600 ~/.ssh/github_deploy.key
  - ssh-keyscan -H 'github.com' >> ~/.ssh/known_hosts
  # prepare git fetching of secrets
  - echo "$gitlab_deploy_privkey" > ~/.ssh/gitlab_deploy.key
  - chmod 600 ~/.ssh/gitlab_deploy.key
  - echo "$ssh_git_shackspace_serverkey" >> ~/.ssh/known_hosts
  # import secret key for secrets
  - which gpg
  - which gpg2
  - echo "$secrets_gpg_key" | gpg --import
deployment test:
  tags:
    - nix
  stage: test
  script:
    # Pure flake build, no secrets required at build time.
    - nix --extra-experimental-features 'nix-command flakes' build --no-link --print-out-paths '.#nixosConfigurations.wolf.config.system.build.toplevel'
    - nix --extra-experimental-features 'nix-command flakes' build --no-link --print-out-paths '.#nixosConfigurations.puyak.config.system.build.toplevel'
nix-shell test:
  stage: test
  tags:
    - nix
  script:
    - nix-shell --pure --command 'true' -p stdenv && echo success
    - nix-shell --pure --command 'false' -p stdenv || echo success
    - git --version
    - ssh -V
    - gpg --version
    - curl --version
wolf deployment:
  tags:
    - shacklan
    - nix
  stage: deploy
  script:
    - cp ~/.ssh/gitlab_deploy.key ~/.ssh/id_rsa
    - git clone git@ssh.git.shackspace.de:rz/secrets.git ~/brain
    - ssh-keyscan -H 'wolf.shack' >> ~/.ssh/known_hosts
    # populate runtime secrets, then build+switch via flake
    - PASSWORD_STORE_DIR=~/brain nix --extra-experimental-features 'nix-command flakes' run '.#populate-secrets' -- wolf wolf.shack
    - nixos-rebuild switch --flake '.#wolf' --target-host root@wolf.shack --extra-experimental-features 'nix-command flakes'
  only:
    changes:
      - .gitlab-ci.yml
      - krebs/**/*
      - lib/**/*
      - .gitmodules
puyak deployment:
  stage: deploy
  tags:
    - shacklan
    - nix
  script:
    - cp ~/.ssh/gitlab_deploy.key ~/.ssh/id_rsa
    - git clone git@ssh.git.shackspace.de:rz/secrets.git ~/brain
    - ssh-keyscan -H 'puyak.shack' >> ~/.ssh/known_hosts
    # populate runtime secrets, then build+switch via flake
    - PASSWORD_STORE_DIR=~/brain nix --extra-experimental-features 'nix-command flakes' run '.#populate-secrets' -- puyak puyak.shack
    - nixos-rebuild switch --flake '.#puyak' --target-host root@puyak.shack --extra-experimental-features 'nix-command flakes'
  only:
    changes:
      - .gitlab-ci.yml
      - krebs/**/*
      - lib/**/*
      - .gitmodules
nur-packages makefu:
  stage: deploy
  tags:
    - nix
  script:
    - git reset --hard origin/master
    - git filter-branch -f --prune-empty --subdirectory-filter makefu/5pkgs HEAD
    - git remote add deploy git@github.com:makefu/nur-packages.git  || git remote set-url deploy git@github.com:makefu/nur-packages.git
    - GIT_SSH_COMMAND="ssh -i ~/.ssh/github_deploy.key" git push --force deploy HEAD:master
    - curl -XPOST http://nur-update.herokuapp.com/update?repo=makefu
  only:
    changes:
      - makefu/**/*
after_script:
    - rm -rf .ssh/
